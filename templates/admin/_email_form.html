<h2>Email to client</h2>
{% set email_tpls = email_template_options(d, p, email_link) %}
<form method="post" action="{{ email_action }}" class="stack-form" style="max-width:680px"
      data-confirm="Send this email to {to}?">
  {% if email_tpls %}
  <label>Load a template
    <select id="email-tpl-pick">
      <option value="">— keep what's below —</option>
      {% for t in email_tpls %}
      <option value="{{ loop.index0 }}">{{ t.name }}</option>
      {% endfor %}
    </select>
  </label>
  <script type="application/json" id="email-tpls">{{ email_tpls|tojson }}</script>
  <script nonce="{{ csp_nonce }}">
  document.getElementById('email-tpl-pick').addEventListener('change', function(){
    if(!this.value){return;}
    var t=JSON.parse(document.getElementById('email-tpls').textContent)[+this.value];
    var f=this.form;
    f.subject.value=t.subject;
    f.message.value=t.body;
  });
  </script>
  {% endif %}
  <label>To <input type="email" name="to" value="{{ p.client_email or '' }}" required></label>
  <label>Subject <input type="text" name="subject" value="{{ email_subject }}" required></label>
  <textarea name="message" rows="9" required>Hi {{ p.client_name.split(' ')[0] }},

{{ email_intro }}

{{ email_link }}

Thank you!
{{ site_name }}</textarea>
  <button type="submit">Send email</button>
</form>
