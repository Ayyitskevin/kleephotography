[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP"]
ignore = [
  "E501",   # long lines OK for SQL strings, template paths, and descriptive text
  "W291",   # trailing whitespace (some legacy)
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.lint.per-file-ignores]
"tests/test_smoke.py" = ["E401", "UP017", "E731", "F401", "F841", "UP012"]
"tests/smoke/*" = ["E401", "UP017", "E731", "F401", "F841", "UP012"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --tb=short"
