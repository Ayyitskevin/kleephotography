[pytest]
testpaths = tests
norecursedirs = backups _backups _bak .git .venv __pycache__
markers =
    unit: fast pure logic tests (no DB, no network)
    integration: tests that exercise SQLite, TestClient, migrations, or integration seams
    smoke: full end-to-end (real DB + jobs + ffmpeg)
addopts = -q --tb=short --strict-markers